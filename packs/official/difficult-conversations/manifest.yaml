# SPDX-License-Identifier: CC-BY-4.0
schema_version: "0.1"
pack_id: official.difficult_conversations
name: Difficult Conversations
version: 0.1.0
description: >-
  Practice real-life conversations that most people avoid or handle poorly.
  Build confidence giving feedback, setting boundaries, and owning mistakes
  with clarity and composure.
author: Outright Mental
license: CC-BY-4.0
content_rating: PG
intensity: >-
  Moderate emotional difficulty. Scenarios involve workplace conflict, personal
  disappointment, friendship pressure, and professional self-advocacy. No
  profanity. No shouting. No harassment. NPCs may express frustration, hurt,
  or skepticism in a realistic way. Not suitable for players seeking a purely
  pleasant practice environment; well-suited for anyone who wants to build
  real-world conversation confidence.
tags:
  - communication
  - workplace
  - relationships
  - emotional-intelligence
  - feedback
  - conflict
supported_languages:
  - en
entry_scenarios:
  - scenarios/coworker_feedback.yaml
  - scenarios/missed_deadline_apology.yaml
  - scenarios/boundary_with_friend.yaml
  - scenarios/ask_for_raise.yaml
assets:
  allow_external_urls: false
safety:
  policy: safety/default.yaml
