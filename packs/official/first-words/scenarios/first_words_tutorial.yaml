# SPDX-License-Identifier: Apache-2.0
# "First Words" tutorial scenario — scripted runtime, zero inference required.
# Designed to be played in the first 60 seconds after install, while the
# starter model downloads in the background.
schema_version: "0.1"
scenario_id: first_words_tutorial
title: First Words
summary: >-
  A 3–5 minute guided tour of Conversation Simulator with Alex Chen, a
  friendly tutorial guide. Alex walks you through state meters, scenario
  events, ending conditions, and the debrief rubric using scripted (not AI)
  responses — so no model download is needed.
player_role:
  label: New Player
  brief: >-
    You just installed Conversation Simulator. Alex Chen is here to show you
    how the app works before you jump into a real scenario. There's no wrong
    answer — just respond naturally and follow where Alex leads.
npc:
  ref: ../npcs/alex_chen.yaml
rubric:
  ref: ../rubrics/tutorial_rubric.yaml
duration:
  max_turns: 8
  soft_time_limit_minutes: 5
opening:
  npc_says: >-
    Welcome! I'm Alex Chen, your tutorial guide. This is Conversation Simulator
    — a private, offline practice space for conversations that matter. Notice
    the two meters at the top: Engagement and Confidence. They update every
    turn based on what you say. Go ahead — say anything to get us started.
goals:
  player_visible:
    - "Learn how state meters work by watching them change as you talk"
    - "Trigger a scenario event to see how events reshape a conversation"
    - "Complete the tutorial and unlock the scenario library"
  hidden:
    - "Alex is tracking whether the player seems curious about how the mechanics work"
    - "Alex wants the player to leave feeling ready to try a real scenario"
state:
  variables:
    engagement:
      min: 0
      max: 100
      default: 30
      visibility: visible
      max_delta_per_turn: 20
    confidence:
      min: 0
      max: 100
      default: 50
      visibility: visible
      max_delta_per_turn: 15
difficulty:
  default: standard
  options:
    standard:
      patience: 100
      volatility: 0
      disclosure: 100
      time_pressure: 0
      label: Tutorial
      description: The only difficulty level — all mechanics are shown at full disclosure, no time pressure.
events:
  - id: warm_moment
    when:
      type: variable_above
      variable: engagement
      threshold: 60
    npc_instruction: >-
      The player has shown genuine engagement and Engagement has crossed 60.
      Warmly acknowledge the moment and use it as a teaching point: explain
      that this is what a scenario event looks like — a threshold crossing that
      shifts your hidden instructions and changes how you behave for the rest
      of the session.
    repeat: false
ending_conditions:
  # The scripted runtime ends the session on its final turn via session_control
  # (ending_type=success, keyword-branched to the player's last message). We do
  # NOT add a variable-based `success` condition here: engagement must climb past
  # 60 to fire the warm_moment event, so any lower success threshold would end the
  # tutorial before the event fires and before the endings/debrief lesson. Timeout
  # is the only scenario-level safety net.
  timeout:
    type: max_turns
    value: 8
taught_dimensions:
  - engagement
  - comprehension
tested_dimensions:
  - engagement
  - comprehension
replay_seed: 1
