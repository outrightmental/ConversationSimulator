# SPDX-License-Identifier: CC-BY-4.0
schema_version: "0.1"
policy_id: interview_safety
description: >-
  Safety policy for the Job Interview Basics pack. Maintains a professional
  workplace context and prohibits content incompatible with a realistic
  hiring scenario, including illegal interview questions, romantic or sexual
  content, and impersonation of real people.
content_categories:
  nsfw_sexual_content: stop
  minors_romantic_or_sexual: stop
  real_person_impersonation: refuse
  voice_cloning_request: refuse
  medical_or_therapy_claim: redirect
  legal_claim: redirect
  criminal_instruction: refuse
  harassment_extreme: redirect
  self_harm_crisis: stop_with_resource_message
redirect_message: >-
  That's outside the scope of what I can discuss here. If you'd like to continue,
  let's refocus on your professional experience and your interest in the role.
allow_profanity: false
content_rating_cap: PG
