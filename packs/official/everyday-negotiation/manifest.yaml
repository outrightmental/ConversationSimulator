schema_version: "0.1"
pack_id: official.everyday_negotiation
name: Everyday Negotiation
version: 0.1.0
description: >-
  Practice realistic everyday negotiation conversations with configurable NPCs.
  Build confidence navigating competing goals and advocating for yourself in
  four common real-world situations: buying a used car, renewing an apartment
  lease, pushing back on freelance scope creep, and resolving a customer
  service dispute.
author: Outright Mental
license: CC-BY-4.0
content_rating: PG
tags:
  - negotiation
  - communication
  - persuasion
  - professional
supported_languages:
  - en
entry_scenarios:
  - scenarios/used_car_negotiation.yaml
  - scenarios/apartment_lease_renewal.yaml
  - scenarios/freelance_scope_negotiation.yaml
  - scenarios/customer_service_refund.yaml
assets:
  allow_external_urls: false
safety:
  policy: safety/default.yaml
