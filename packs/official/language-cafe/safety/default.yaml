schema_version: "0.1"
policy_id: language_cafe_safety
description: >-
  Safety policy for the Language Café pack. Maintains a friendly, low-stakes
  social context for language practice and prohibits any content inappropriate
  for a general audience.
content_categories:
  nsfw_sexual_content: stop
  minors_romantic_or_sexual: stop
  real_person_impersonation: refuse
  voice_cloning_request: refuse
  medical_or_therapy_claim: redirect
  legal_claim: redirect
  criminal_instruction: refuse
  harassment_extreme: redirect
  self_harm_crisis: stop_with_resource_message
redirect_message: >-
  That's outside the scope of this language practice session. Let's continue
  with the conversation.
allow_profanity: false
content_rating_cap: G
