name: TTS issue
description: Report a problem with speech output or the text-to-speech pipeline.
labels:
  - speech
body:
  - type: markdown
    attributes:
      value: |
        Use this template for issues with NPC voice playback, audio quality,
        voice selection, or the TTS service.

        See [docs/voice-smoke-tests.md](https://github.com/outrightmental/ConversationSimulator/blob/main/docs/voice-smoke-tests.md) for
        the manual test suite.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: >
        Example: NPC audio plays at double speed and skips the last syllable
        of each sentence.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Enable TTS in Settings → Voice → NPC voice on
        2. Select voice "af_bella"
        3. Start a conversation
        4. Observe: first NPC turn plays back too fast
    validations:
      required: true

  - type: dropdown
    id: tts-backend
    attributes:
      label: TTS backend
      options:
        - Kokoro (default)
        - System TTS
        - Other (describe below)
    validations:
      required: true

  - type: input
    id: voice
    attributes:
      label: Voice selected
      placeholder: "Example: af_bella"
    validations:
      required: false

  - type: textarea
    id: hardware
    attributes:
      label: Hardware and OS
      placeholder: |
        OS: macOS 14.5
        CPU: Apple M3 Pro
        Audio output: Built-in speakers
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I ran the voice smoke tests in docs/voice-smoke-tests.md.
          required: false
        - label: I searched existing issues and this has not been reported before.
          required: true
