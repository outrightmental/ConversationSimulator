# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions — jobs declare no additional scopes.
permissions:
  contents: read

jobs:
  smoke-check:
    name: Smoke check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify monorepo structure
        run: |
          echo "Local: bash scripts/smoke-check.sh"
          bash scripts/smoke-check.sh

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          echo "Local: shellcheck scripts/*.sh"
          shellcheck scripts/*.sh

  # ── PowerShell lint and unit tests ──────────────────────────────────────────
  # The .sh scripts have had shellcheck since day one; the .ps1 scripts had no CI
  # coverage of any kind. That gap is why the v0.2.3 release broke: the Windows
  # signing path in scripts/jsign-sign.ps1 only executes on a v* tag with the KMS
  # secrets present, so a call that fails on every PowerShell version
  # ($cert.GetRSAPublicKey() — an extension method invoked with instance syntax)
  # reached main without ever running once.
  #
  # Runs on windows-latest because that is where the signing scripts actually run.
  powershell:
    name: PowerShell lint and tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Pester and PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      # Gate on Error/ParseError only. The repo currently carries ~240 style
      # warnings; failing on those would make this job noise on arrival and it
      # would be disabled within a week. Errors and parse errors are unambiguous.
      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          Write-Host "Local: Invoke-ScriptAnalyzer -Path scripts -Recurse -Severity Error,ParseError"
          $findings = Invoke-ScriptAnalyzer -Path scripts -Recurse -Severity Error,ParseError
          if ($findings) {
            $findings | Format-Table Severity, ScriptName, Line, RuleName, Message -AutoSize | Out-String | Write-Host
            throw "PSScriptAnalyzer reported $($findings.Count) error-level finding(s)."
          }
          Write-Host "No error-level findings."

      - name: Run PowerShell unit tests
        shell: pwsh
        run: |
          Write-Host "Local: Invoke-Pester -Path tests/signing -Output Detailed"
          $cfg = New-PesterConfiguration
          $cfg.Run.Path      = 'tests/signing'
          $cfg.Run.Exit      = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            services/convsim-core/pyproject.toml
            packages/prompt-composer/pyproject.toml
      - name: Install prompt-composer
        run: pip install -e "packages/prompt-composer[dev]"
      - name: Test prompt-composer
        working-directory: packages/prompt-composer
        run: |
          echo "Local: cd packages/prompt-composer && python -m pytest"
          python -m pytest
      - name: Install convsim-core
        run: pip install -e "services/convsim-core[dev]"
      - name: Test convsim-core
        working-directory: services/convsim-core
        run: |
          echo "Local: cd services/convsim-core && python -m pytest"
          python -m pytest

  frontend:
    name: Frontend typecheck and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared TypeScript packages
        run: |
          pnpm --filter @convsim/shared-types build
          pnpm --filter @convsim/scenario-schema build
      - name: Typecheck packages
        run: |
          echo "Local: pnpm test:types"
          pnpm test:types
      - name: Typecheck web app
        run: |
          echo "Local: pnpm --filter @convsim/web typecheck"
          pnpm --filter @convsim/web typecheck
      - name: i18n check (pseudo-locale hardcoded string audit)
        run: |
          echo "Local: pnpm --filter @convsim/web check-i18n"
          pnpm --filter @convsim/web check-i18n
      - name: Run web tests
        run: |
          echo "Local: pnpm --filter @convsim/web test"
          pnpm --filter @convsim/web test
      - name: Run pack-loader tests
        run: |
          echo "Local: pnpm --filter @convsim/pack-loader test"
          pnpm --filter @convsim/pack-loader test
      - name: Run offline smoke tests (mock runtime)
        run: |
          echo "Local: pnpm --filter @convsim/cli exec vitest run tests/offline-smoke-test.test.ts tests/runner.test.ts"
          pnpm --filter @convsim/cli exec vitest run tests/offline-smoke-test.test.ts tests/runner.test.ts
      - name: Run CLI unit tests
        run: |
          echo "Local: pnpm --filter @convsim/cli exec vitest run tests/cli.test.ts"
          pnpm --filter @convsim/cli exec vitest run tests/cli.test.ts

  schemas:
    name: Schema validation tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run schema load tests
        run: |
          echo "Local: node packages/scenario-schema/tests/load-schemas.js"
          node packages/scenario-schema/tests/load-schemas.js
      - name: Run schema validation tests (examples + rejection)
        run: |
          echo "Local: node packages/scenario-schema/tests/validate-schemas.js"
          node packages/scenario-schema/tests/validate-schemas.js
      - name: Run scenario-schema unit tests (Zod validators + YAML round-trips)
        run: |
          echo "Local: pnpm --filter @convsim/scenario-schema exec vitest run"
          pnpm --filter @convsim/scenario-schema exec vitest run

  acceptance:
    name: Acceptance tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            services/convsim-core/pyproject.toml
            packages/prompt-composer/pyproject.toml
      - name: Install prompt-composer
        run: pip install -e "packages/prompt-composer[dev]"
      - name: Install convsim-core
        run: pip install -e "services/convsim-core[dev]"
      - name: Run acceptance tests
        run: |
          echo "Local: python -m pytest tests/acceptance/ -v"
          python -m pytest tests/acceptance/ -v
      - name: Run network guard acceptance tests (local-only play)
        run: |
          echo "Local: python -m pytest tests/acceptance/test_network_guard.py -v"
          python -m pytest tests/acceptance/test_network_guard.py -v

  desktop-check:
    name: Desktop Rust check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Cache and install Linux system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
          version: 1.0
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - name: Check desktop crate compiles
        env:
          # Non-secret repo variable: pack-id ↔ DLC App ID mapping used by the
          # DLC ownership check.  Empty in open-source / contributor builds —
          # the build script skips validation when the variable is unset.
          VITE_STEAM_DLC_APP_IDS: ${{ vars.STEAM_DLC_APP_IDS }}
        run: |
          echo "Local: bash scripts/desktop-smoke.sh"
          bash scripts/desktop-smoke.sh

  pack-validation:
    name: Pack validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: pnpm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            services/convsim-core/pyproject.toml
            packages/prompt-composer/pyproject.toml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate official packs (schema check)
        run: |
          echo "Local: node packages/scenario-schema/tests/validate-packs.js packs/official"
          node packages/scenario-schema/tests/validate-packs.js packs/official
      - name: Validate sample pack (schema check)
        run: |
          echo "Local: node packages/scenario-schema/tests/validate-packs.js packs/sample"
          node packages/scenario-schema/tests/validate-packs.js packs/sample
      - name: Install prompt-composer
        run: pip install -e "packages/prompt-composer[dev]"
      - name: Install convsim-core
        run: pip install -e "services/convsim-core[dev]"
      - name: Validate official packs (full policy check)
        run: |
          echo "Local: for d in packs/official/*/; do convsim-validate-pack \"\$d\"; done"
          for d in packs/official/*/; do
            convsim-validate-pack "$d"
          done
      - name: Validate sample pack (full policy check)
        run: |
          echo "Local: for d in packs/sample/*/; do convsim-validate-pack \"\$d\"; done"
          for d in packs/sample/*/; do
            convsim-validate-pack "$d"
          done
