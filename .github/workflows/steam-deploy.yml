# SPDX-License-Identifier: Apache-2.0
# Steam deploy workflow.
#
# Uploads a tagged GitHub release to Steam via SteamPipe (steamcmd).
# This workflow is triggered manually — it does not run on every push.
#
# ── One-time setup required ──────────────────────────────────────────────────
#
# Repository variables (Settings → Secrets and variables → Actions → Variables):
#   STEAM_APP_ID              Valve-assigned App ID (non-secret, assigned at registration)
#   STEAM_DEPOT_WINDOWS_ID    Windows x86-64 depot ID
#   STEAM_DEPOT_MACOS_ID      macOS depot ID
#   STEAM_DEPOT_LINUX_ID      Linux / SteamOS depot ID
#
# Repository secrets (Settings → Secrets and variables → Actions → Secrets):
#   STEAM_USERNAME            Steam username of the dedicated CI build account
#   STEAM_CONFIG_VDF          Base64-encoded config.vdf from an authenticated Steam
#                             session on the build account (bypasses SteamGuard in CI)
#
# See publishing/STEAM_APP_REGISTRATION.md for how to obtain and rotate these values.
#
# ── Release gate reminder ────────────────────────────────────────────────────
#
# Stage 3 (private beta): set_live_branch = "beta"  ← workflow default
#   All Stage 3 gate criteria in docs/steam-mvp-scope.md must pass first,
#   including G3-01 (code signing and notarisation) and G3-02 (depot audit).
#
# Stage 4 (public release): set_live_branch = "default"
#   All Stage 4 gate criteria must pass first, including G4-01 (Valve review
#   approval) and G4-02 (Steam Deck Verified tier).
#
# Leave set_live_branch empty to stage the build without making any branch
# live — use this for dry runs or when manual sign-off is required.
#
# ── Private beta verification procedure ──────────────────────────────────────
#
# After this workflow completes with set_live_branch = "beta":
#
# 1. Open the Steamworks partner portal → App Admin → Builds.
#    Confirm the new build appears under the "beta" branch with the correct
#    description and depot file counts for all three platforms.
#
# 2. Verify the build number matches the GitHub release tag:
#    Steamworks → Builds → [build row] → View Manifest.
#    The version field must equal the tag (e.g. 0.1.0 for v0.1.0).
#
# 3. Confirm Stage 3 gate criteria before sharing the beta key with testers:
#    G3-01 — macOS app is notarised; Windows installer is Authenticode-signed.
#    G3-02 — No model-weight files in any depot (CI depot audit enforces this).
#    G3-04 — All release-blocking risks in STEAM_COMPLIANCE_AND_RISK_REGISTER.md
#             show status MITIGATED, ACCEPTED, or DEFERRED.
#    Full criteria list: docs/steam-mvp-scope.md Stage 3 gate.
#
# 4. Generate Steam product keys for beta testers (if not already done):
#    Steamworks → Packages → [Free package] → Generate Steam Product Codes.
#    Share keys only with named testers — not publicly.
#
# 5. Ask at least one tester on each of Windows, macOS, and Linux to:
#    a. Activate the key and install via Steam.
#    b. Complete a full text session and debrief (G3-06).
#    c. Confirm the Steam overlay (Shift+Tab) works without breaking the app (G3-03).
#    d. Report any session-ending bugs, data-loss bugs, or privacy regressions.
#
# 6. Record sign-off in docs/release-checklist.md before promoting to "default".
name: Steam Deploy

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub release tag to upload (e.g. v0.1.0)'
        required: true
        type: string
      build_description:
        description: >
          Human-readable build description shown in Steamworks partner portal.
          Defaults to "Conversation Simulator <tag>" if left empty.
        required: false
        default: ''
        type: string
      set_live_branch:
        description: >
          Steam branch to set live after upload.
          Defaults to "beta" (Stage 3 private beta).
          Leave empty to stage the build without making it live (dry run).
          Use "default" only for a Stage 4 public release — all gate criteria
          in docs/steam-mvp-scope.md must be met before selecting "default".
        required: false
        default: 'beta'
        type: string

permissions:
  contents: read

jobs:
  steam-upload:
    name: Upload to Steam (${{ inputs.release_tag }})
    runs-on: ubuntu-latest

    # The steam-release environment gates this job behind a manual approval step.
    # Create it in GitHub → Settings → Environments → New environment.
    # Add required reviewers so no Steam credential is exposed without sign-off.
    environment: steam-release

    steps:
      - uses: actions/checkout@v4

      # ── Resolve build description ──────────────────────────────────────────
      - name: Resolve build description
        id: desc
        # Inputs are passed through env vars — never interpolated directly into
        # the shell — to avoid GitHub Actions expression injection (CWE-94).
        env:
          BUILD_DESCRIPTION: ${{ inputs.build_description }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -n "$BUILD_DESCRIPTION" ]; then
            printf 'value=%s\n' "$BUILD_DESCRIPTION" >> "$GITHUB_OUTPUT"
          else
            printf 'value=Conversation Simulator %s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          fi

      # ── Download GitHub release assets ─────────────────────────────────────
      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release download "$RELEASE_TAG" \
            --dir release-artifacts \
            --skip-errors

      - name: List downloaded artifacts
        run: find release-artifacts -type f | sort

      # ── Organise artifacts into per-platform depot content directories ──────
      #
      # Steam depots must contain application files, not installer packages.
      # macOS ships the .app bundle extracted from the .app.tar.gz published
      # by the release workflow — NOT the .dmg disk image.  The .app is signed
      # and notarised by Apple (gate G3-01) in release.yml before it reaches here.
      # Linux ships the AppImage (portable, runs without installation).
      # Windows still stages the .exe/.msi installers below — a portable-app
      # depot layout for Windows is tracked separately and not part of this
      # macOS-focused change.
      - name: Organise depot content
        run: |
          mkdir -p steam-content/windows steam-content/macos steam-content/linux

          find release-artifacts -name "*.exe" \
            -exec cp -v {} steam-content/windows/ \;
          find release-artifacts -name "*.msi" \
            -exec cp -v {} steam-content/windows/ \;

          # macOS: extract the .app bundle from the .app.tar.gz published by
          # the release workflow. Steam depots require the raw application
          # directory, not the .dmg installer, so that steamcmd uploads
          # ConversationSimulator.app/... directly into the depot.
          # See publishing/STEAM_DEPOT_CONTENTS.md — macOS depot section.
          if find release-artifacts -name "*.app.tar.gz" | grep -q .; then
            find release-artifacts -name "*.app.tar.gz" | while IFS= read -r f; do
              echo "Extracting $f -> steam-content/macos/"
              tar -xzf "$f" -C steam-content/macos/
            done
          else
            # Fallback: stage the .dmg if no .app.tar.gz is available.
            # This path should only occur when deploying artifacts built before
            # the .app.tar.gz upload was added to release.yml.
            echo "WARNING: no .app.tar.gz found; staging .dmg as placeholder" >&2
            echo "NOTE: .dmg is an installer, not application files — depot audit may flag this" >&2
            find release-artifacts -name "*.dmg" \
              -exec cp -v {} steam-content/macos/ \;
          fi

          find release-artifacts -name "*.AppImage" \
            -exec cp -v {} steam-content/linux/ \;
          find release-artifacts -name "*.deb" \
            -exec cp -v {} steam-content/linux/ \;

          echo "--- Depot content summary ---"
          find steam-content -type f | sort

      # ── Verify macOS .app code-signature presence ─────────────────────────────
      # Confirms the extracted .app bundle was signed before it is staged for
      # Steam upload.  This deploy workflow runs on an Ubuntu runner, so
      # codesign(1) and spctl(1) are unavailable; full notarisation verification
      # was already performed in release.yml before the artifact was uploaded.
      #
      # This lightweight check verifies that the _CodeSignature directory exists
      # inside the bundle — codesign always creates it when signing succeeds.
      # An absent _CodeSignature means the artifact is unsigned, which will cause
      # Gatekeeper to block the app on clean macOS installs and violates gate
      # G3-01 (docs/steam-mvp-scope.md).
      #
      # Non-blocking: a missing signature emits a WARN (not an error) so that
      # dry-run and internal staging uploads of unsigned dev builds are not
      # blocked.  Signed builds must be used for any Stage 3+ release.
      - name: Verify macOS .app code-signature presence
        run: |
          APP_PATH="$(find steam-content/macos -maxdepth 1 -name '*.app' -type d \
            2>/dev/null | head -n1)"
          if [ -z "$APP_PATH" ]; then
            echo "  INFO  No .app directory found in steam-content/macos — skipping check."
            exit 0
          fi
          if [ -d "$APP_PATH/Contents/_CodeSignature" ]; then
            echo "  OK  Code signature present: $APP_PATH/Contents/_CodeSignature"
            echo "      Notarisation was verified in release.yml before artifact upload."
            echo "      Gate G3-01 macOS signature criterion satisfied."
          else
            echo "  WARN  $APP_PATH does not contain a code signature (_CodeSignature missing)." >&2
            echo "        Signed and notarised builds are required for Stage 3/4 Steam release" >&2
            echo "        (gate G3-01 in docs/steam-mvp-scope.md)." >&2
            echo "        This warning does not block dry-run or internal staging uploads." >&2
            echo "        See docs/platform-notes.md for signing requirements." >&2
          fi

      # ── Verify no forbidden files are staged ───────────────────────────────
      # Enforces depot content exclusion rule MD-04 and the approved binary
      # payload list (see publishing/STEAM_DEPOT_CONTENTS.md) using the shared
      # audit script, so CI catches exactly what the SR-08 manual checklist
      # expects: weight files (.gguf/.safetensors/.bin/.pt/.pth/.ckpt) and
      # unapproved binary payloads (large pickle/NumPy/ONNX files, models/ dirs).
      - name: Audit depot content
        run: |
          for platform in windows macos linux; do
            echo "── Auditing steam-content/$platform ──"
            ./scripts/depot-audit.sh "steam-content/$platform"
          done

      # ── Generate SteamPipe build scripts from VDF templates ────────────────
      - name: Generate SteamPipe VDF files
        env:
          STEAM_APP_ID:            ${{ vars.STEAM_APP_ID }}
          STEAM_DEPOT_WINDOWS_ID:  ${{ vars.STEAM_DEPOT_WINDOWS_ID }}
          STEAM_DEPOT_MACOS_ID:    ${{ vars.STEAM_DEPOT_MACOS_ID }}
          STEAM_DEPOT_LINUX_ID:    ${{ vars.STEAM_DEPOT_LINUX_ID }}
          STEAM_BUILD_DESCRIPTION: ${{ steps.desc.outputs.value }}
          STEAM_SET_LIVE_BRANCH:   ${{ inputs.set_live_branch }}
        run: |
          mkdir -p steam-build/output
          envsubst < steam/app_build.vdf.tpl     > steam-build/app_build.vdf
          envsubst < steam/depot_windows.vdf.tpl > steam-build/depot_windows.vdf
          envsubst < steam/depot_macos.vdf.tpl   > steam-build/depot_macos.vdf
          envsubst < steam/depot_linux.vdf.tpl   > steam-build/depot_linux.vdf

          # Log the generated app_build.vdf with numeric IDs redacted for safety.
          echo "--- Generated app_build.vdf (IDs redacted) ---"
          sed 's/[0-9]\{6,\}/[REDACTED]/g' steam-build/app_build.vdf

      # ── Install steamcmd ───────────────────────────────────────────────────
      - name: Install steamcmd
        run: |
          sudo add-apt-repository multiverse
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          echo steamcmd steam/question select "I AGREE" | sudo debconf-set-selections
          sudo apt-get install -y steamcmd

      # ── Restore SteamGuard config ──────────────────────────────────────────
      # Decodes the base64-encoded config.vdf from the STEAM_CONFIG_VDF secret.
      # This bypasses the interactive SteamGuard prompt in headless CI.
      - name: Restore Steam config
        env:
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
        run: |
          mkdir -p "$HOME/.steam/steam/config"
          printf '%s' "$STEAM_CONFIG_VDF" | base64 --decode \
            > "$HOME/.steam/steam/config/config.vdf"
          chmod 600 "$HOME/.steam/steam/config/config.vdf"

      # ── Upload to Steam ────────────────────────────────────────────────────
      - name: Upload build to Steam
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        run: |
          steamcmd \
            +login "$STEAM_USERNAME" \
            +run_app_build "$(pwd)/steam-build/app_build.vdf" \
            +quit

      # ── Log build output ───────────────────────────────────────────────────
      - name: Show steamcmd build output
        if: always()
        run: |
          if [ -d steam-build/output ]; then
            find steam-build/output -type f | sort
            for f in steam-build/output/*.log; do
              [ -f "$f" ] && { echo "--- $f ---"; cat "$f"; }
            done
          fi
