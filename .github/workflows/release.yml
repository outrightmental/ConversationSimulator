# SPDX-License-Identifier: Apache-2.0
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0-alpha.1)'
        required: true
        type: string

# Write permission needed to create GitHub releases and upload assets.
permissions:
  contents: write

jobs:
  # ── Smoke check ──────────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Smoke check
        run: bash scripts/smoke-check.sh

  # ── Cross-platform desktop builds ─────────────────────────────────────────────
  build-desktop:
    name: Desktop (${{ matrix.name }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    # The `secrets` context cannot be referenced from a step `if:` conditional
    # (it evaluates to empty and the condition is always false). Expose only a
    # boolean presence flag at the job level so the import step can gate on
    # `env` — deliberately NOT the certificate itself, which must stay scoped to
    # the import step (leaking APPLE_CERTIFICATE into the Tauri build step would
    # make Tauri attempt its own keychain import without the password).
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
      # HAS_NOTARIZATION is true when either the preferred ASC API key trio or
      # the Apple-ID fallback trio is configured.  Both paths drive the same
      # notarytool submission inside Tauri; only the authentication method differs.
      HAS_NOTARIZATION: ${{ secrets.APPLE_ID != '' || secrets.APPLE_API_KEY != '' }}
      HAS_ASC_API_KEY: ${{ secrets.APPLE_API_KEY != '' }}
      HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_SIGN_CERT_PFX != '' }}
      HAS_UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
      # REQUIRE_SIGNED_MACOS is true on release tags (any v*) regardless of
      # whether the run was triggered by a git push or workflow_dispatch.
      # When true, the verify step fails (rather than INFO-skips) if the macOS
      # build was not signed and notarised.  This turns gate G3-01 from a manual
      # checklist item into a hard CI enforcement.  Contributor forks and PR
      # builds are unaffected because they never carry a v* tag.
      REQUIRE_SIGNED_MACOS: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.tag, 'v')) }}
      # Steam depot builds bundle llama-server so players get zero-setup
      # inference; GitHub release installers stay lean and download it on first
      # run (see docs/model-download-policy.md §8). This one workflow feeds both
      # channels, so bundling is an explicit opt-in: set the BUNDLE_LLAMA_SERVER
      # repository variable to 'true' only for Steam-depot builds.
      BUNDLE_LLAMA_SERVER: ${{ vars.BUNDLE_LLAMA_SERVER == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS is ARM64-only via GitHub-hosted runners: macos-13 (the last
          # Intel/x86_64 runner) was deprecated by GitHub and is no longer
          # available. macos-latest is Apple Silicon (ARM64) since late 2024.
          - name: macOS-aarch64
            runner: macos-latest
          # Linux x86_64 — AppImage + .deb
          - name: Linux-x86_64
            runner: ubuntu-22.04
          # Windows x86_64 — NSIS installer + MSI
          - name: Windows-x86_64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v5

      # ── Linux system packages required by Tauri / WebKitGTK ──────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # ── Node.js / pnpm ───────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      # ── Rust toolchain ───────────────────────────────────────────────────────
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      # ── Frontend build ───────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared TypeScript packages
        run: |
          pnpm --filter @convsim/shared-types build
          pnpm --filter @convsim/scenario-schema build

      - name: Build web frontend
        run: pnpm --filter @convsim/web build

      # ── macOS code-signing setup ─────────────────────────────────────────────
      # Imports the Apple Developer ID p12 certificate into a temporary keychain
      # so that both PyInstaller (sidecar signing) and Tauri (bundle signing +
      # notarisation) can find it.
      #
      # Required repository secrets (Settings → Secrets and variables → Actions):
      #   APPLE_CERTIFICATE          Base64-encoded Developer ID Application .p12
      #   APPLE_CERTIFICATE_PASSWORD Passphrase for the .p12 file
      #   APPLE_SIGNING_IDENTITY     Full identity string, e.g.
      #                              "Developer ID Application: Outright Mental (TEAMID)"
      #   APPLE_ID                   Apple ID email of the notarisation account
      #   APPLE_PASSWORD             App-specific password for the Apple ID
      #   APPLE_TEAM_ID              10-character Apple Developer Team ID
      #
      # When these secrets are absent (contributor forks, unsigned local builds)
      # this step is skipped and the build produces an unsigned artifact — suitable
      # for development and internal testing but not for Stage 3/4 Steam release.
      - name: Import Apple Developer certificate (macOS only)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

      # ── Python core build (PyInstaller standalone binary) ────────────────────
      # Produces apps/desktop/src-tauri/resources/bin/convsim-core[.exe] which
      # Tauri bundles as a resource (bundle.resources: ["resources/**/*"] in
      # tauri.conf.json).  The binary must be present before `tauri build`.
      #
      # On macOS with APPLE_SIGNING_IDENTITY set, convsim-core.spec signs the
      # sidecar binary and all embedded Python extensions with the Developer ID
      # certificate using the entitlements in apps/desktop/src-tauri/entitlements.plist.
      - name: Set up Python for core build
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build convsim-core standalone binary
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # working-directory (below) already places us in services/convsim-core;
          # all paths here are relative to it.
          python -m pip install -q -e "../../packages/prompt-composer"
          python -m pip install -q -e ".[build]"
          python -m PyInstaller convsim-core.spec --noconfirm

          # Copy to the Tauri resources directory for bundling.
          mkdir -p ../../apps/desktop/src-tauri/resources/bin
          if [ -f dist/convsim-core.exe ]; then
            cp dist/convsim-core.exe ../../apps/desktop/src-tauri/resources/bin/
          else
            cp dist/convsim-core ../../apps/desktop/src-tauri/resources/bin/
            chmod +x ../../apps/desktop/src-tauri/resources/bin/convsim-core
          fi
        working-directory: services/convsim-core

      - name: Verify bundled core binary
        shell: bash
        run: |
          BIN_DIR=apps/desktop/src-tauri/resources/bin
          if [ -f "$BIN_DIR/convsim-core" ] || [ -f "$BIN_DIR/convsim-core.exe" ]; then
            echo "OK: convsim-core binary present in $BIN_DIR"
            ls -lh "$BIN_DIR"
          else
            echo "ERROR: convsim-core binary missing from $BIN_DIR" >&2
            exit 1
          fi

      # ── Bundle llama-server binary (Steam builds only) ────────────────────────
      # Downloads and bundles the llama-server binary alongside convsim-core so
      # Steam players get zero-setup inference with no first-run download.
      # Gated on the BUNDLE_LLAMA_SERVER repository variable (see the job `env`
      # block): GitHub release installers leave it unset so they stay lean and
      # download the engine on first run instead.
      #
      # The binary is placed at src-tauri/resources/runtimes/llama-server[.exe]
      # and picked up by Tauri's bundle.resources: ["resources/**/*"] glob.
      # At runtime the Tauri shell sets CONVSIM_BUNDLED_RUNTIME_DIR to the
      # resources/runtimes directory (see src-tauri/src/lib.rs), and Python's
      # find_executable() resolves <CONVSIM_BUNDLED_RUNTIME_DIR>/llama-server[.exe]
      # from there. Do NOT place it under resources/bin/ — that is where
      # convsim-core lives and is never scanned for sidecar binaries.
      - name: Bundle llama-server (Linux / macOS — Steam only)
        if: env.BUNDLE_LLAMA_SERVER == 'true' && runner.os != 'Windows'
        shell: bash
        env:
          LLAMA_CPP_DEST: apps/desktop/src-tauri/resources/runtimes
        run: |
          set -euo pipefail
          bash runtimes/llama_cpp/download-runtime.sh
          ls -lh apps/desktop/src-tauri/resources/runtimes/llama-server

      - name: Bundle llama-server (Windows — Steam only)
        if: env.BUNDLE_LLAMA_SERVER == 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dest = "apps\desktop\src-tauri\resources\runtimes"
          .\runtimes\llama_cpp\download-runtime.ps1 -Dest $dest
          Get-Item "$dest\llama-server.exe" | Select-Object Name, Length

      # ── Sync app version to the release tag ──────────────────────────────────
      # The built binary reports the `version` field from tauri.conf.json, and
      # the in-app updater compares that against the `version` in latest.json
      # (which the release job derives from the tag).  If the two drift, the
      # updater's semver comparison never fires: e.g. a binary hard-coded to
      # "0.1.0" would treat a "0.1.0-beta.2" manifest as *older* (pre-release <
      # release) and silently offer no update.  Stamping the tag version here
      # keeps binary and manifest in lockstep so successive betas compare
      # correctly (beta.2 > beta.1, and a stable release > any of its betas).
      - name: Set app version from release tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          CONF=apps/desktop/src-tauri/tauri.conf.json
          python3 - "$CONF" "$VERSION" <<'PYEOF'
          import json, sys
          path, version = sys.argv[1], sys.argv[2]
          with open(path) as f:
              conf = json.load(f)
          conf["version"] = version
          with open(path, "w") as f:
              json.dump(conf, f, indent=2)
              f.write("\n")
          print(f"Set {path} version to {version}")
          PYEOF
          grep '"version"' "$CONF"

      # ── Tauri desktop build ──────────────────────────────────────────────────
      # On macOS, Tauri reads APPLE_SIGNING_IDENTITY and notarisation credentials
      # to sign the .app bundle and submit it to Apple's notary service.
      # These env vars are no-ops on Linux and Windows.  When the secrets are
      # absent the build is unsigned (suitable for dev/internal builds but
      # blocked by Gatekeeper on clean installs).
      #
      # Notarisation auth — two supported paths, in order of preference:
      #
      # 1. App Store Connect API key (preferred):
      #      APPLE_API_KEY      — key ID (e.g. "ABCDE12345")
      #      APPLE_API_ISSUER   — issuer UUID from App Store Connect
      #      APPLE_API_KEY_PATH — base64-encoded .p8 private key content
      #                           (decoded to a temp file before the build)
      #    No 2FA coupling; revocable and scoped to App Manager role.
      #
      # 2. Apple ID + app-specific password (fallback):
      #      APPLE_ID           — Apple ID email used for notarisation
      #      APPLE_PASSWORD     — app-specific password for Apple ID
      #      APPLE_TEAM_ID      — ten-character team ID (required for both paths)
      #
      # When both are configured, ASC API key takes precedence: Apple ID
      # credentials are unset so Tauri only uses the ASC key path.
      #
      # Absent APPLE_SIGNING_IDENTITY expands to an empty string. Tauri's
      # macOS bundler reads Ok("") and tries to codesign with an empty identity
      # ("Signing with identity \"\"" → "no identity found" → build failure).
      # We therefore fully *unset* all Apple signing env vars when no identity
      # is configured, so Tauri skips signing and emits an unsigned .app.
      - name: Build Tauri desktop
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ASC API key credentials (preferred notarisation auth — see above).
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # APPLE_API_KEY_PATH secret stores the base64-encoded .p8 content;
          # renamed here to avoid a collision with the APPLE_API_KEY_PATH env
          # var that Tauri expects to hold a filesystem path.  The script below
          # decodes this value to a temp file and then sets APPLE_API_KEY_PATH.
          APPLE_API_KEY_PATH_B64: ${{ secrets.APPLE_API_KEY_PATH }}
          # Non-secret repo variable: pack-id ↔ DLC App ID mapping baked into
          # both the Vite bundle (VITE_ prefix) and validated by build.rs.
          # The beforeBuildCommand in tauri.conf.json re-runs `pnpm web build`
          # so this env var reaches Vite automatically.
          VITE_STEAM_DLC_APP_IDS: ${{ vars.STEAM_DLC_APP_IDS }}
        run: |
          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            unset APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
            unset APPLE_API_KEY APPLE_API_ISSUER
          elif [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ] && \
               [ -n "${APPLE_API_KEY_PATH_B64:-}" ]; then
            # ASC API key path (preferred): decode .p8 to a temp file and tell
            # Tauri where it lives.  Clear Apple ID credentials so Tauri does
            # not attempt both auth paths simultaneously.
            ASC_KEY_FILE="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
            printf '%s' "$APPLE_API_KEY_PATH_B64" | base64 --decode > "$ASC_KEY_FILE"
            chmod 600 "$ASC_KEY_FILE"
            export APPLE_API_KEY_PATH="$ASC_KEY_FILE"
            unset APPLE_ID APPLE_PASSWORD
          fi
          pnpm --filter @convsim/desktop build
          # Scrub the decoded ASC private key from disk the moment the build ends.
          if [ -n "${ASC_KEY_FILE:-}" ] && [ -f "${ASC_KEY_FILE:-}" ]; then
            rm -f "$ASC_KEY_FILE"
          fi

      # ── Verify macOS signature, entitlements, notarization, and stapling ──────
      # Confirms that Tauri's signing + Apple notarisation pipeline completed
      # correctly before the artifact is uploaded.
      #
      # Codesign verification: --deep checks every nested binary and dylib;
      # --strict rejects any relaxed-mode signatures that would fail on newer
      # macOS releases.
      #
      # Entitlement verification: confirms the five Hardened Runtime entitlements
      # declared in apps/desktop/src-tauri/entitlements.plist are present in the
      # signed bundle.  A mismatch here means the wrong entitlements file was
      # used, which would cause runtime failures (JIT, dylib loading, microphone).
      #
      # Notarization + stapling: spctl --assess verifies Gatekeeper would accept
      # the app on a clean macOS install.  xcrun stapler validate confirms the
      # notarisation ticket is embedded in the bundle so the assessment passes
      # offline (no Apple CDN required at install time).
      #
      # Gate G3-01: notarised + Gatekeeper-accepted macOS build required for
      # Stage 3 Steam private beta — see docs/steam-mvp-scope.md.
      #
      # Enforcement: when REQUIRE_SIGNED_MACOS is true (any v* release tag) this
      # step FAILS rather than INFO-skips when APPLE_CERTIFICATE is absent or
      # notarisation was skipped.  This makes gate G3-01 a hard CI requirement
      # on every tagged release.  Contributor forks and PR builds (no v* tag)
      # continue to skip with an informational message.
      - name: Verify macOS signature, entitlements, notarization, and stapling
        if: runner.os == 'macOS' && (env.HAS_APPLE_CERT == 'true' || env.REQUIRE_SIGNED_MACOS == 'true')
        shell: bash
        env:
          HAS_APPLE_CERT: ${{ env.HAS_APPLE_CERT }}
          HAS_NOTARIZATION: ${{ env.HAS_NOTARIZATION }}
          REQUIRE_SIGNED_MACOS: ${{ env.REQUIRE_SIGNED_MACOS }}
        run: |
          set -euo pipefail

          # ── Enforcement gate ─────────────────────────────────────────────────
          if [ "${HAS_APPLE_CERT:-}" != "true" ]; then
            if [ "${REQUIRE_SIGNED_MACOS:-}" = "true" ]; then
              echo "ERROR: APPLE_CERTIFICATE is not configured but a signed macOS build" >&2
              echo "       is required for this release tag." >&2
              echo "       Tagged releases (v*) enforce gate G3-01: the macOS .app must" >&2
              echo "       be code-signed, notarised, and Gatekeeper-accepted." >&2
              echo "       Set the APPLE_CERTIFICATE org secret and rerun this workflow." >&2
              echo "       See publishing/MACOS_SIGNING_AND_NOTARIZATION.md." >&2
              exit 1
            else
              echo "  INFO  APPLE_CERTIFICATE is not set — unsigned build (dev / contributor fork)."
              echo "        Signing and notarisation are required for gate G3-01"
              echo "        (Stage 3/4 Steam release).  See publishing/MACOS_SIGNING_AND_NOTARIZATION.md."
              exit 0
            fi
          fi

          BUNDLE_DIR=apps/desktop/src-tauri/target/release/bundle/macos
          APP_PATH="$(find "$BUNDLE_DIR" -maxdepth 1 -name '*.app' | head -n1)"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: no .app bundle found under $BUNDLE_DIR" >&2
            exit 1
          fi

          echo "=== Code signature verification: $APP_PATH ==="
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          echo ""
          echo "=== Hardened Runtime entitlement verification ==="
          ENTITLEMENTS="$(codesign --display --entitlements :- "$APP_PATH" 2>&1)"
          printf '%s\n' "$ENTITLEMENTS"
          fail=0
          for KEY in \
            com.apple.security.cs.allow-jit \
            com.apple.security.cs.disable-library-validation \
            com.apple.security.network.client \
            com.apple.security.device.audio-input \
            com.apple.security.files.user-selected.read-write; do
            if printf '%s' "$ENTITLEMENTS" | grep -q "$KEY"; then
              echo "  OK: $KEY"
            else
              echo "  ERROR: expected entitlement $KEY missing from signed bundle" >&2
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || exit 1

          if [ "$HAS_NOTARIZATION" = "true" ]; then
            echo ""
            echo "=== Notarization verification (Gatekeeper assessment) ==="
            spctl --assess --type execute --verbose=2 "$APP_PATH"

            echo ""
            echo "=== Stapled notarization ticket verification ==="
            xcrun stapler validate "$APP_PATH"
            echo "  Gate G3-01 macOS criterion met: signed, notarised, and Gatekeeper-accepted."
          else
            if [ "${REQUIRE_SIGNED_MACOS:-}" = "true" ]; then
              echo ""
              echo "ERROR: No notarisation credentials are configured but a notarised" >&2
              echo "       build is required for this release tag." >&2
              echo "       Tagged releases (v*) enforce gate G3-01: the macOS .app must" >&2
              echo "       be notarised and the ticket must be stapled." >&2
              echo "       Preferred: set APPLE_API_KEY, APPLE_API_ISSUER, and APPLE_API_KEY_PATH." >&2
              echo "       Fallback:  set APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID." >&2
              echo "       See publishing/MACOS_SIGNING_AND_NOTARIZATION.md." >&2
              exit 1
            else
              echo ""
              echo "  SKIP  No notarisation credentials configured."
              echo "        The .app is code-signed but not notarised."
              echo "        Gatekeeper will block this build on clean macOS installs."
              echo "        Preferred: set APPLE_API_KEY / APPLE_API_ISSUER / APPLE_API_KEY_PATH."
              echo "        Fallback:  set APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID."
              echo "        Notarisation is required for gate G3-01."
            fi
          fi

      # ── Authenticode signing (Windows only, optional) ─────────────────────────
      # Signs the NSIS installer (.exe) and MSI package produced by Tauri.
      # Signing requires two repository secrets:
      #
      #   WINDOWS_SIGN_CERT_PFX      — base64-encoded PFX certificate file
      #   WINDOWS_SIGN_CERT_PASSWORD — password for the PFX file
      #
      # When neither secret is set the step exits 0 and the build continues
      # with an unsigned installer.  Unsigned installers trigger a Windows
      # Defender SmartScreen "unrecognised publisher" warning on first launch;
      # this is acceptable for developer builds but must be resolved before the
      # Stage 3 (private beta) gate (G3-01 in docs/steam-mvp-scope.md).
      #
      # To obtain a code-signing certificate:
      #   - Purchase an EV certificate from DigiCert, Sectigo, or similar CA.
      #   - Export the private key and certificate chain as a .pfx file.
      #   - Base64-encode the .pfx: certutil -encode cert.pfx cert.b64
      #   - Add cert.b64 contents as WINDOWS_SIGN_CERT_PFX in repository secrets.
      #   - Add the PFX password as WINDOWS_SIGN_CERT_PASSWORD in repository secrets.
      - name: Sign Windows installers (Authenticode)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CERT_PFX_BASE64: ${{ secrets.WINDOWS_SIGN_CERT_PFX }}
          CERT_PASSWORD:   ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
        run: |
          if (-not $env:CERT_PFX_BASE64) {
            Write-Host "  INFO  WINDOWS_SIGN_CERT_PFX is not set — producing unsigned build."
            Write-Host "        Add the secret to enable Authenticode signing for release builds."
            Write-Host "        See docs/platform-notes.md for certificate setup instructions."
            exit 0
          }

          # Decode the base64-encoded PFX to a temporary file.
          #
          # `certutil -encode` (the command in the setup docs) wraps its output
          # in PEM `-----BEGIN/END CERTIFICATE-----` header/footer lines.
          # [Convert]::FromBase64String tolerates embedded whitespace/newlines
          # but throws on those marker lines, so strip any line that is not
          # base64 payload before decoding.  This also accepts a plain,
          # unwrapped base64 blob unchanged.
          $pfxPath = Join-Path $env:RUNNER_TEMP "convsim-sign.pfx"
          try {
            $b64 = ($env:CERT_PFX_BASE64 -split "`r?`n" |
              Where-Object { $_ -notmatch '^-----' }) -join ''
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($b64))

            # Locate all Tauri-produced NSIS installers and MSI packages.
            $bundleDir = "apps\desktop\src-tauri\target\release\bundle"
            $installers = Get-ChildItem -Recurse -Path $bundleDir `
              -Include "*.exe","*.msi" -ErrorAction SilentlyContinue

            if (-not $installers) {
              Write-Host "  WARN  No installers found in $bundleDir — skipping signing."
              exit 0
            }

            # Resolve signtool.exe.  It ships with the Windows SDK but is not on
            # PATH on GitHub-hosted Windows runners, so fall back to searching
            # the Windows Kits install directory for the newest x64 build.
            $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue).Source
            if (-not $signtool) {
              $signtool = Get-ChildItem `
                -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
                -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
                Sort-Object FullName -Descending |
                Select-Object -First 1 -ExpandProperty FullName
            }
            if (-not $signtool) {
              Write-Error "signtool.exe not found on PATH or under the Windows SDK; cannot sign installers."
              exit 1
            }
            Write-Host "  Using signtool: $signtool"

            foreach ($installer in $installers) {
              Write-Host "  Signing: $($installer.FullName)"
              # /tr  — RFC 3161 timestamp server (DigiCert, always free to use)
              # /td  — timestamp digest algorithm
              # /fd  — file digest algorithm
              & $signtool sign `
                /f $pfxPath `
                /p $env:CERT_PASSWORD `
                /tr http://timestamp.digicert.com `
                /td sha256 `
                /fd sha256 `
                /v `
                $installer.FullName
              if ($LASTEXITCODE -ne 0) {
                Write-Error "signtool failed for $($installer.Name) (exit $LASTEXITCODE)"
                exit $LASTEXITCODE
              }
            }

            Write-Host "  INFO  All installers signed successfully."
          } finally {
            # Always remove the PFX from disk, even on failure.
            if (Test-Path $pfxPath) { Remove-Item $pfxPath -Force }
          }

      # ── Verify Windows Authenticode signature ─────────────────────────────────
      # Confirms signtool correctly embedded a valid Authenticode signature in
      # each installer produced by Tauri.  Skipped when WINDOWS_SIGN_CERT_PFX is
      # absent (unsigned build — see the signing step above for details).
      - name: Verify Windows Authenticode signature
        if: runner.os == 'Windows' && env.HAS_WINDOWS_CERT == 'true'
        shell: pwsh
        run: |
          $bundleDir = "apps\desktop\src-tauri\target\release\bundle"
          $installers = Get-ChildItem -Recurse -Path $bundleDir `
            -Include "*.exe","*.msi" -ErrorAction SilentlyContinue
          if (-not $installers) {
            Write-Host "  WARN  No installers found for signature verification."
            exit 0
          }

          $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue).Source
          if (-not $signtool) {
            $signtool = Get-ChildItem `
              -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
              -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $signtool) {
            Write-Error "signtool.exe not found — cannot verify Authenticode signature."
            exit 1
          }

          foreach ($installer in $installers) {
            Write-Host "  Verifying: $($installer.FullName)"
            & $signtool verify /pa /v $installer.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Authenticode verification failed for $($installer.Name) (exit $LASTEXITCODE)"
              exit $LASTEXITCODE
            }
          }
          Write-Host "  INFO  All installers have a valid Authenticode signature."

      # ── Scan Windows installers for malware (VirusTotal, optional) ─────────────
      # Submits each Windows installer to VirusTotal for analysis and records the
      # analysis URL in the CI log and as a retained artifact.  This step is
      # intentionally non-blocking: freshly compiled Rust/Tauri executables are
      # often flagged by heuristic engines as false positives, and blocking the
      # release on false positives would be counterproductive.
      #
      # Required repository secret:
      #   VIRUSTOTAL_API_KEY    VirusTotal Public API v3 key.  Free tier allows
      #                         4 file uploads/minute and 500/day.  See
      #                         docs/platform-notes.md for key setup and rotation.
      #
      # Files > 32 MB use the large-file upload URL provided by the VirusTotal
      # API (Tauri NSIS installers frequently exceed this threshold).
      #
      # When the secret is absent the step exits 0 with an INFO message.
      - name: Scan Windows installers for malware (VirusTotal, optional)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          if (-not $env:VIRUSTOTAL_API_KEY) {
            Write-Host "  INFO  VIRUSTOTAL_API_KEY is not set — skipping malware scan."
            Write-Host "        Set the secret to enable VirusTotal pre-upload scanning."
            Write-Host "        See docs/platform-notes.md for setup and key rotation instructions."
            exit 0
          }

          $bundleDir = "apps\desktop\src-tauri\target\release\bundle"
          $installers = Get-ChildItem -Recurse -Path $bundleDir `
            -Include "*.exe","*.msi" -ErrorAction SilentlyContinue
          if (-not $installers) {
            Write-Host "  WARN  No installers found — skipping malware scan."
            exit 0
          }

          $recordPath = Join-Path $env:RUNNER_TEMP "virustotal-scan-record.txt"
          # VirusTotal standard upload limit; files above this use the large-file endpoint.
          $MAX_STANDARD_BYTES = 32 * 1024 * 1024

          foreach ($installer in $installers) {
            $sizeMB = [math]::Round($installer.Length / 1MB, 1)
            Write-Host "  Uploading $($installer.Name) (${sizeMB} MB) to VirusTotal..."
            try {
              if ($installer.Length -gt $MAX_STANDARD_BYTES) {
                Write-Host "    File exceeds 32 MB — requesting large-file upload URL."
                $urlResp = Invoke-RestMethod `
                  -Uri "https://www.virustotal.com/api/v3/files/upload_url" `
                  -Headers @{ "x-apikey" = $env:VIRUSTOTAL_API_KEY }
                $uploadUrl = $urlResp.data
              } else {
                $uploadUrl = "https://www.virustotal.com/api/v3/files"
              }

              $response = Invoke-RestMethod `
                -Uri $uploadUrl `
                -Method POST `
                -Headers @{ "x-apikey" = $env:VIRUSTOTAL_API_KEY } `
                -Form @{ file = Get-Item $installer.FullName }

              $analysisId = $response.data.id
              $vtUrl = "https://www.virustotal.com/gui/file-analysis/$analysisId"
              Write-Host "    Analysis ID : $analysisId"
              Write-Host "    View results: $vtUrl"
              Add-Content -Path $recordPath `
                -Value "$($installer.Name) => $analysisId => $vtUrl"
            } catch {
              Write-Host "  WARN  VirusTotal upload failed for $($installer.Name): $_"
              Write-Host "        Continuing — malware scan is non-blocking."
            }
          }

          if (Test-Path $recordPath) {
            Write-Host ""
            Write-Host "  Scan record summary:"
            Get-Content $recordPath | ForEach-Object { Write-Host "    $_" }
          }

      - name: Upload VirusTotal scan record
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: virustotal-scan-${{ matrix.name }}
          path: ${{ runner.temp }}/virustotal-scan-record.txt
          if-no-files-found: ignore
          retention-days: 90

      # ── Verify Linux artifact permissions ────────────────────────────────────
      # AppImage files must be executable before upload so that players can run
      # them directly after downloading.  Tauri sets the bit, but we verify here
      # so the CI log records the exact permissions of what was uploaded.
      - name: Verify Linux artifact permissions
        if: runner.os == 'Linux'
        run: |
          BUNDLE_ROOT=apps/desktop/src-tauri/target/release/bundle

          echo "── convsim-core binary ──"
          ls -lh apps/desktop/src-tauri/resources/bin/convsim-core
          test -x apps/desktop/src-tauri/resources/bin/convsim-core || {
            echo "ERROR: convsim-core is not executable" >&2; exit 1
          }

          echo ""
          echo "── AppImage ──"
          find "$BUNDLE_ROOT/appimage" -name "*.AppImage" | while read -r f; do
            ls -lh "$f"
            if [[ ! -x "$f" ]]; then
              echo "WARNING: $f is not executable — fixing..."
              chmod +x "$f"
            fi
          done

          echo ""
          echo "── Debian package ──"
          find "$BUNDLE_ROOT/deb" -name "*.deb" | while read -r f; do
            ls -lh "$f"
          done

          echo ""
          echo "── SHA-256 checksums ──"
          # Tauri bundle filenames contain a space ("Conversation Simulator_…"),
          # so the stream must be NUL-delimited end-to-end — a plain
          # `find | sort | xargs` word-splits on the space and hands sha256sum
          # non-existent "Conversation" / "Simulator_…" fragments (exit 123).
          find "$BUNDLE_ROOT" \( -name "*.AppImage" -o -name "*.deb" \) -print0 | \
            sort -z | xargs -0 sha256sum


      # ── Package the macOS .app bundle for the Steam depot ────────────────────
      # Tauri only emits `.dmg` (installer) and the raw `.app` bundle directory
      # here; the `.app.tar.gz` updater artifact is NOT produced because the
      # updater is not configured (no bundle.createUpdaterArtifacts / signing
      # key).  Steam depots need the raw application files, so we tarball the
      # signed & notarised `.app` ourselves.  Using `tar` (bsdtar) preserves the
      # code signature and stapled notarisation ticket, and archiving with the
      # bundle directory as CWD keeps `<name>.app` at the archive root so
      # steam-deploy can extract it straight into steam-content/macos/.
      - name: Package macOS .app bundle for Steam depot (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -eu
          BUNDLE_DIR=apps/desktop/src-tauri/target/release/bundle/macos
          APP_PATH="$(find "$BUNDLE_DIR" -maxdepth 1 -name '*.app' | head -n1)"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: no .app bundle found under $BUNDLE_DIR" >&2
            exit 1
          fi
          APP_NAME="$(basename "$APP_PATH")"
          TARBALL="$BUNDLE_DIR/${APP_NAME%.app}.app.tar.gz"
          echo "Packaging $APP_PATH -> $TARBALL"
          tar -czf "$TARBALL" -C "$BUNDLE_DIR" "$APP_NAME"
          ls -lh "$TARBALL"

      # ── Sign updater artifacts (optional, requires TAURI_SIGNING_PRIVATE_KEY) ─
      # Generates .sig files alongside the updater-relevant installer/archive so
      # the release job can embed them in the Tauri updater manifest (latest.json).
      #
      # Required repository secrets (Settings → Secrets and variables → Actions):
      #   TAURI_SIGNING_PRIVATE_KEY          Base64-encoded Ed25519 private key.
      #                                      Generate with:
      #                                        pnpm --filter @convsim/desktop exec tauri signer generate
      #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD Passphrase for the key (may be empty).
      #
      # When either secret is absent this step exits 0 with an INFO message;
      # the release is published without an updater manifest and the in-app
      # banner check fails silently (offline guard).
      - name: Sign updater artifacts
        if: env.HAS_UPDATER_KEY == 'true'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          # Absolute so paths still resolve after `pnpm --filter` changes the
          # working directory to apps/desktop.
          BUNDLE_ROOT="$PWD/apps/desktop/src-tauri/target/release/bundle"

          # Sign via the JS Tauri CLI (@tauri-apps/cli) already installed as the
          # desktop dev-dependency.  `cargo tauri` would require the separate
          # cargo-tauri binary, which this workflow does not install.
          sign_file() {
            local FILE="$1"
            echo "  Signing: $FILE"
            pnpm --filter @convsim/desktop exec tauri signer sign \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              ${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:+--password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"} \
              "$FILE"
          }

          if [ "$RUNNER_OS" = "macOS" ]; then
            ARCHIVE="$(find "$BUNDLE_ROOT/macos" -maxdepth 1 -name '*.app.tar.gz' | head -n1)"
            [ -n "$ARCHIVE" ] && sign_file "$ARCHIVE" || echo "  WARN  No .app.tar.gz found — skipping"
          elif [ "$RUNNER_OS" = "Linux" ]; then
            APPIMAGE="$(find "$BUNDLE_ROOT/appimage" -name '*.AppImage' | head -n1)"
            [ -n "$APPIMAGE" ] && sign_file "$APPIMAGE" || echo "  WARN  No .AppImage found — skipping"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            INSTALLER="$(find "$BUNDLE_ROOT/nsis" -name '*-setup.exe' | head -n1)"
            [ -n "$INSTALLER" ] && sign_file "$INSTALLER" || echo "  WARN  No NSIS installer found — skipping"
          fi

      # ── Collect installers ───────────────────────────────────────────────────
      # Tauri v2 places bundles under target/release/bundle/<format>/.
      # The .app.tar.gz (macOS) is the raw app bundle in a tarball, produced by
      # the packaging step above — Steam depots require application files
      # directly, not the .dmg installer, so the steam-deploy workflow extracts
      # this tarball into steam-content/macos/.
      - name: Upload desktop installer artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-${{ matrix.name }}
          # Glob patterns cover all known Tauri installer formats.
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/release/bundle/**/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/**/*.app.tar.gz.sig
            apps/desktop/src-tauri/target/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/**/*.AppImage.sig
            apps/desktop/src-tauri/target/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/release/bundle/**/*.exe.sig
            apps/desktop/src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: warn
          retention-days: 7

  # ── Publish GitHub release ────────────────────────────────────────────────────
  release:
    name: Publish release
    needs: build-desktop
    runs-on: ubuntu-latest
    env:
      HAS_UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v5

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          pattern: desktop-*
          merge-multiple: true

      - name: List collected artifacts
        run: find release-artifacts -type f | sort

      - name: Generate SHA-256 checksums
        # Record bare filenames (not the release-artifacts/... paths) so the
        # manifest matches the flattened asset names on the release page and
        # `sha256sum -c checksums-sha256.txt` works next to the downloads.
        run: |
          find release-artifacts -type f | sort | while IFS= read -r f; do
            ( cd "$(dirname "$f")" && sha256sum "$(basename "$f")" )
          done > checksums-sha256.txt
          cat checksums-sha256.txt

      # ── Generate Tauri updater manifest (latest.json) ─────────────────────────
      # latest.json is the endpoint the app's tauri-plugin-updater polls on
      # launch.  It lists the new version, per-platform download URLs, and the
      # Ed25519 updater signatures produced by the "Sign updater artifacts" step.
      #
      # This step is skipped when TAURI_SIGNING_PRIVATE_KEY is absent; in that
      # case the in-app update check fails silently (offline guard) and no banner
      # is shown — acceptable until signing infrastructure lands in #235.
      - name: Generate Tauri updater manifest (latest.json)
        if: env.HAS_UPDATER_KEY == 'true'
        run: |
          set -euo pipefail

          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="outrightmental/ConversationSimulator"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Helper: read .sig content or emit empty string.
          sig_content() {
            local FILE="$1"
            [ -f "$FILE" ] && cat "$FILE" || echo ""
          }

          # Locate each platform's updater artifact and its signature.
          MACOS_ARCHIVE="$(find release-artifacts -name '*.app.tar.gz' | head -n1)"
          MACOS_SIG_FILE="${MACOS_ARCHIVE}.sig"
          MACOS_SIG="$(sig_content "$MACOS_SIG_FILE")"
          MACOS_FILENAME="$(basename "$MACOS_ARCHIVE")"

          LINUX_APPIMAGE="$(find release-artifacts -name '*.AppImage' | head -n1)"
          LINUX_SIG_FILE="${LINUX_APPIMAGE}.sig"
          LINUX_SIG="$(sig_content "$LINUX_SIG_FILE")"
          LINUX_FILENAME="$(basename "$LINUX_APPIMAGE")"

          WINDOWS_EXE="$(find release-artifacts -name '*-setup.exe' | head -n1)"
          WINDOWS_SIG_FILE="${WINDOWS_EXE}.sig"
          WINDOWS_SIG="$(sig_content "$WINDOWS_SIG_FILE")"
          WINDOWS_FILENAME="$(basename "$WINDOWS_EXE")"

          # Emit the manifest only when at least one sig file is present.
          if [ -z "$MACOS_SIG" ] && [ -z "$LINUX_SIG" ] && [ -z "$WINDOWS_SIG" ]; then
            echo "  WARN  No .sig files found — skipping latest.json generation."
            echo "        Set TAURI_SIGNING_PRIVATE_KEY to enable updater manifests."
            exit 0
          fi

          python3 - <<PYEOF > latest.json
          import json, sys

          platforms = {}
          for key, sig, filename in [
            ("darwin-aarch64", """$MACOS_SIG""", "$MACOS_FILENAME"),
            ("linux-x86_64",   """$LINUX_SIG""",   "$LINUX_FILENAME"),
            ("windows-x86_64", """$WINDOWS_SIG""", "$WINDOWS_FILENAME"),
          ]:
            sig = sig.strip()
            if sig and filename:
              platforms[key] = {
                "signature": sig,
                "url": "$BASE_URL/" + filename,
              }

          manifest = {
            "version": "$VERSION",
            "notes":   "See https://github.com/$REPO/releases/tag/$TAG for the full release notes.",
            "pub_date": "$PUB_DATE",
            "platforms": platforms,
          }
          print(json.dumps(manifest, indent=2))
          PYEOF

          echo "=== Generated latest.json ==="
          cat latest.json

      # Derive all release metadata before touching the release so we can:
      #   - detect a pre-existing (hand-authored) release and preserve its title/body
      #   - set prerelease from the tag semver suffix rather than hardcoding true
      #   - set make_latest only for stable tags that will be published immediately
      - name: Resolve release metadata
        id: relmeta
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAS_UPDATER_KEY: ${{ env.HAS_UPDATER_KEY }}
          # Pass the tag through the environment rather than interpolating the
          # ${{ }} expression straight into the script: a tag name can legally
          # contain shell metacharacters (`$`, backticks, ...) that would
          # otherwise be evaluated here (command injection). Quoting "$TAG"
          # below keeps it inert.
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          # Pre-release iff the tag carries a semver pre-release suffix (a hyphen):
          # v0.1.0 -> stable/Latest, v0.1.0-beta.1 -> pre-release. Mirrors the updater's
          # version ordering (beta < release) used to build latest.json.
          if [[ "$TAG" == *-* ]]; then PRERELEASE=true; else PRERELEASE=false; fi

          # Does a release for this tag already exist? Creating a release in the GitHub
          # UI pushes the tag (triggering this workflow) once the release row already
          # exists, so a hand-authored title/body/"Latest" flag is already live.
          if gh release view "$TAG" >/dev/null 2>&1; then EXISTS=true; else EXISTS=false; fi

          # Mark as "Latest" only for a stable tag that will actually be published
          # (a draft release can never be Latest).
          if [[ "$PRERELEASE" == false && ( "$HAS_UPDATER_KEY" == true || "$EXISTS" == true ) ]]; then
            MAKE_LATEST=true
          else
            MAKE_LATEST=false
          fi

          # Preserve an existing release's human-authored title and notes by passing
          # empty name/body. For a brand-new release, seed the default title + template.
          if [[ "$EXISTS" == true ]]; then
            NAME=""
            BODY_PATH=""
            DRAFT=false            # never demote an already-published release to draft
          else
            NAME="Conversation Simulator $TAG"
            BODY_PATH="docs/release-notes-template.md"
            if [[ "$HAS_UPDATER_KEY" == true ]]; then DRAFT=false; else DRAFT=true; fi
          fi

          {
            echo "tag=$TAG"
            echo "prerelease=$PRERELEASE"
            echo "make_latest=$MAKE_LATEST"
            echo "name=$NAME"
            echo "body_path=$BODY_PATH"
            echo "draft=$DRAFT"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved: tag=$TAG prerelease=$PRERELEASE make_latest=$MAKE_LATEST exists=$EXISTS draft=$DRAFT"

      # When the updater manifest is being produced (HAS_UPDATER_KEY), the
      # versioned release MUST be published immediately rather than left as a
      # draft: the beta-channel `latest.json` uploaded in the next step points at
      # this release's assets and tag page, and draft assets 404 for the public.
      # When signing is off and no pre-existing release exists, we keep the
      # previous draft/manual-review behaviour (relmeta sets draft=true).
      - name: Create versioned GitHub release
        id: versioned_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.relmeta.outputs.tag }}
          name: ${{ steps.relmeta.outputs.name }}
          body_path: ${{ steps.relmeta.outputs.body_path }}
          draft: ${{ steps.relmeta.outputs.draft }}
          prerelease: ${{ steps.relmeta.outputs.prerelease }}
          make_latest: ${{ steps.relmeta.outputs.make_latest }}
          files: |
            release-artifacts/**
            checksums-sha256.txt
            ${{ env.HAS_UPDATER_KEY == 'true' && 'latest.json' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Update beta-channel release ───────────────────────────────────────────
      # The app's updater plugin checks a fixed URL:
      #   .../releases/download/beta-channel/latest.json
      # Uploading latest.json here means every new beta release is discovered
      # automatically on next app launch without any URL change in the binary.
      # Previous versioned releases (e.g. v0.1.0-beta.1) remain downloadable.
      - name: Update beta-channel release with latest updater manifest
        if: env.HAS_UPDATER_KEY == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: beta-channel
          name: Beta channel — latest updater manifest
          body: |
            This release holds the Tauri updater manifest (`latest.json`) for the
            beta channel.  The app's built-in update checker polls this asset on
            launch to detect new beta builds.

            **Do not install from this release directly** — download from the
            corresponding versioned pre-release instead.

            Latest beta: ${{ github.event.inputs.tag || github.ref_name }}
          prerelease: true
          draft: false
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
