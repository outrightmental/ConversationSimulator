  <text x="200" y="448" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#f4f4f5">66<tspan font-size="9" font-weight="400" fill="#71717a"> / 100</tspan></text>
  <rect x="200" y="453" width="120" height="4" rx="2" fill="#27272a"/>
  <rect x="200" y="453" width="79" height="4" rx="2" fill="#22c55e"/>

  <!-- pressure_level 5 / 10 -->
  <text x="366" y="430" font-family="system-ui,sans-serif" font-size="10" fill="#a1a1aa">pressure_level</text>
  <text x="366" y="448" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#f4f4f5">5<tspan font-size="9" font-weight="400" fill="#71717a"> / 10</tspan></text>
  <rect x="366" y="453" width="120" height="4" rx="2" fill="#27272a"/>
