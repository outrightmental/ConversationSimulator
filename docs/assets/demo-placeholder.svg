<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0d1117" rx="8"/>
  <rect x="1" y="1" width="798" height="398" fill="none" stroke="#30363d" stroke-width="2" rx="8"/>

  <!-- Terminal-style header bar -->
  <rect x="0" y="0" width="800" height="32" fill="#161b22" rx="8"/>
  <rect x="0" y="16" width="800" height="16" fill="#161b22"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="16" r="6" fill="#27c93f"/>
  <text x="400" y="21" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">Conversation Simulator</text>

  <!-- Scenario label -->
  <text x="32" y="68" font-family="monospace" font-size="13" fill="#58a6ff">Scenario:</text>
  <text x="120" y="68" font-family="monospace" font-size="13" fill="#e6edf3">The Executive Gauntlet  ·  Job Interview Basics</text>

  <!-- Divider -->
  <line x1="32" y1="80" x2="768" y2="80" stroke="#21262d" stroke-width="1"/>

  <!-- Turn 1 -->
  <text x="32" y="112" font-family="monospace" font-size="12" fill="#3fb950">You:</text>
  <text x="80" y="112" font-family="monospace" font-size="12" fill="#e6edf3">"I led the data platform redesign — cut nightly processing from 4 hours to 40 minutes."</text>

  <!-- NPC response -->
  <text x="32" y="138" font-family="monospace" font-size="12" fill="#f78166">Victor:</text>
  <text x="90" y="138" font-family="monospace" font-size="12" fill="#e6edf3">"That's a headline number. Walk me through the specific trade-off you made to get</text>
  <text x="90" y="154" font-family="monospace" font-size="12" fill="#e6edf3">there. What did you give up, and was it the right call in hindsight?"</text>

  <!-- State line -->
  <rect x="32" y="170" width="736" height="28" fill="#161b22" rx="4"/>
  <text x="48" y="189" font-family="monospace" font-size="12" fill="#8b949e">State:</text>
  <text x="98" y="189" font-family="monospace" font-size="12" fill="#3fb950">credibility +12</text>
  <text x="210" y="189" font-family="monospace" font-size="12" fill="#8b949e">·</text>
  <text x="224" y="189" font-family="monospace" font-size="12" fill="#f78166">pressure_level +1</text>
  <text x="350" y="189" font-family="monospace" font-size="12" fill="#8b949e">·</text>
  <text x="364" y="189" font-family="monospace" font-size="12" fill="#e6edf3">composure 65</text>

  <!-- Divider -->
  <line x1="32" y1="214" x2="768" y2="214" stroke="#21262d" stroke-width="1"/>

  <!-- Turn 2 -->
  <text x="32" y="244" font-family="monospace" font-size="12" fill="#3fb950">You:</text>
  <text x="80" y="244" font-family="monospace" font-size="12" fill="#e6edf3">"We moved from monolithic batch jobs to an event-driven pipeline. We traded</text>
  <text x="80" y="260" font-family="monospace" font-size="12" fill="#e6edf3">strict ordering for parallelism — acceptable for analytics, not for billing."</text>

  <!-- NPC response -->
  <text x="32" y="286" font-family="monospace" font-size="12" fill="#f78166">Victor:</text>
  <text x="90" y="286" font-family="monospace" font-size="12" fill="#e6edf3">"All right. Let's say you're right about that. How does it hold up if you scale</text>
  <text x="90" y="302" font-family="monospace" font-size="12" fill="#e6edf3">from a hundred thousand to ten million users in eighteen months?"</text>

  <!-- State line -->
  <rect x="32" y="318" width="736" height="28" fill="#161b22" rx="4"/>
  <text x="48" y="337" font-family="monospace" font-size="12" fill="#8b949e">State:</text>
  <text x="98" y="337" font-family="monospace" font-size="12" fill="#3fb950">credibility +20</text>
  <text x="210" y="337" font-family="monospace" font-size="12" fill="#8b949e">·</text>
  <text x="224" y="337" font-family="monospace" font-size="12" fill="#3fb950">grudging_respect triggered</text>
  <text x="430" y="337" font-family="monospace" font-size="12" fill="#8b949e">·</text>
  <text x="444" y="337" font-family="monospace" font-size="12" fill="#e6edf3">composure 70</text>

  <!-- Bottom label -->
  <text x="400" y="380" font-family="monospace" font-size="11" fill="#484f58" text-anchor="middle">[ Demo GIF — replace with animated recording at launch ]</text>
</svg>
