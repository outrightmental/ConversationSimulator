  <text x="48" y="434" font-family="system-ui,sans-serif" font-size="12" fill="#86efac">•  Named a concrete outcome (4h → 40min) before diving into detail.</text>
  <text x="48" y="454" font-family="system-ui,sans-serif" font-size="12" fill="#86efac">•  Distinguished clearly between analytics and billing requirements — showed systems thinking.</text>
  <text x="48" y="474" font-family="system-ui,sans-serif" font-size="12" fill="#86efac">•  Did not become defensive when challenged directly.</text>

