  <text x="88" y="538" font-family="system-ui,sans-serif" font-size="12" fill="#e4e4e7">You articulated the trade-off between ordering and parallelism unprompted — Victor stopped</text>
  <text x="88" y="554" font-family="system-ui,sans-serif" font-size="12" fill="#e4e4e7">pressing and shifted to a scale question.</text>
