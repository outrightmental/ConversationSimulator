  <g fill="#a78bfa">
    <rect x="6" y="18" width="36" height="26" rx="8"/>
    <path d="M13 40 L13 54 L27 40 Z"/>
  </g>
  <g fill="#6ee7b7">
    <rect x="22" y="6" width="36" height="26" rx="8"/>
    <path d="M51 30 L51 44 L37 30 Z"/>
  </g>
</svg>
