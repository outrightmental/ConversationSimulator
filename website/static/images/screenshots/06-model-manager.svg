  <text x="48" y="496" font-family="system-ui,sans-serif" font-size="11" fill="#71717a">SHA-256: def456…  ·  Source: Hugging Face (Mistral AI)</text>
  <rect x="764" y="452" width="88" height="28" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
